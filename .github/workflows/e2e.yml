name: E2E (smoke)

# Smoke-tests the deployed app. Runs on demand and daily — not on every push,
# since it hits the live free-tier API (cold starts) and shouldn't gate merges.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: 'true'
          # Override to test a different deployment.
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL || 'https://smart-job-search-fe.vercel.app' }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
